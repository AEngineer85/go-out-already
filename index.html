<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Nicholas Weiss — Product Systems &amp; AI Leadership</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0d0f;
    --bg-1: #111316;
    --surface: #15181c;
    --surface-2: #1b1f24;
    --line: #25292f;
    --line-2: #2f343b;
    --ink: #ece7dd;
    --ink-2: #c8c2b6;
    --muted: #7e7b73;
    --muted-2: #595650;
    --signal: #e6b269;
    --signal-2: #f0c98b;
    --signal-dim: #6e5532;
    --green: #8fbf8a;
    --red: #d98a7a;
    --blue: #87a8c9;

    --sans: "Inter Tight", "Inter", -apple-system, system-ui, sans-serif;
    --mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
    --serif: "Newsreader", Georgia, serif;
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    font-feature-settings: "ss01", "cv11";
  }
  ::selection { background: var(--signal); color: #0c0d0f; }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--line); border: 2px solid var(--bg); border-radius: 6px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--line-2); }

  /* utility */
  .mono { font-family: var(--mono); }
  .label {
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
  }
  .label-signal { color: var(--signal); }
  .hairline { border-top: 1px solid var(--line); }
  .grid-bg {
    background-image:
      linear-gradient(to right, rgba(255,255,255,0.018) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255,255,255,0.018) 1px, transparent 1px);
    background-size: 56px 56px;
  }
  .pulse-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--signal);
    box-shadow: 0 0 0 0 rgba(230,178,105,0.6);
    animation: pulse 2.2s ease-out infinite;
    display: inline-block;
    flex-shrink: 0;
  }
  .pulse-dot.green { background: var(--green); box-shadow: 0 0 0 0 rgba(143,191,138,0.6); animation-name: pulseG; }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(230,178,105,0.45); }
    70% { box-shadow: 0 0 0 8px rgba(230,178,105,0); }
    100% { box-shadow: 0 0 0 0 rgba(230,178,105,0); }
  }
  @keyframes pulseG {
    0% { box-shadow: 0 0 0 0 rgba(143,191,138,0.45); }
    70% { box-shadow: 0 0 0 8px rgba(143,191,138,0); }
    100% { box-shadow: 0 0 0 0 rgba(143,191,138,0); }
  }

  /* primitives */
  .panel {
    background: var(--surface);
    border: 1px solid var(--line);
  }
  .panel-bare {
    border: 1px solid var(--line);
  }
  .corner-marks::before, .corner-marks::after,
  .corner-marks > .cm1, .corner-marks > .cm2 {
    content: "";
    position: absolute;
    width: 8px; height: 8px;
    border-color: var(--signal);
    border-style: solid;
  }
  .corner-marks { position: relative; }
  .corner-marks::before { top: -1px; left: -1px; border-width: 1px 0 0 1px; }
  .corner-marks::after { top: -1px; right: -1px; border-width: 1px 1px 0 0; }
  .corner-marks > .cm1 { bottom: -1px; left: -1px; border-width: 0 0 1px 1px; }
  .corner-marks > .cm2 { bottom: -1px; right: -1px; border-width: 0 1px 1px 0; }

  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    height: 34px; padding: 0 14px;
    background: transparent; color: var(--ink);
    border: 1px solid var(--line-2);
    font-family: var(--mono);
    font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
    cursor: pointer;
    transition: border-color .15s, background .15s, color .15s;
  }
  .btn:hover { border-color: var(--signal); color: var(--signal); }
  .btn-primary { background: var(--signal); color: #0c0d0f; border-color: var(--signal); }
  .btn-primary:hover { background: var(--signal-2); color: #0c0d0f; border-color: var(--signal-2); }

  /* placeholder image */
  .img-ph {
    background:
      repeating-linear-gradient(135deg,
        rgba(255,255,255,0.025) 0 1px,
        transparent 1px 8px),
      var(--surface-2);
    border: 1px solid var(--line);
    color: var(--muted);
    font-family: var(--mono); font-size: 10.5px;
    letter-spacing: 0.14em; text-transform: uppercase;
    display: flex; align-items: center; justify-content: center;
    text-align: center;
  }

  /* section */
  section[data-section] {
    border-top: 1px solid var(--line);
    padding: 88px 0;
  }
  section[data-section]:first-of-type { border-top: 0; padding-top: 0; }

  .container {
    max-width: 1480px;
    margin: 0 auto;
    padding: 0 40px;
  }
  @media (max-width: 900px) { .container { padding: 0 20px; } section[data-section] { padding: 56px 0; } }

  .section-head {
    display: grid;
    grid-template-columns: 220px 1fr;
    gap: 40px;
    margin-bottom: 48px;
    align-items: baseline;
  }
  @media (max-width: 900px) { .section-head { grid-template-columns: 1fr; gap: 12px; margin-bottom: 28px; } }
  .section-eyebrow { display: flex; flex-direction: column; gap: 8px; }
  .section-eyebrow .id { font-family: var(--mono); font-size: 11px; color: var(--signal); letter-spacing: 0.14em; }
  .section-eyebrow .kind { font-family: var(--mono); font-size: 10.5px; color: var(--muted); letter-spacing: 0.18em; text-transform: uppercase; }
  .section-title {
    font-family: var(--sans);
    font-weight: 400;
    font-size: clamp(28px, 3.4vw, 44px);
    letter-spacing: -0.02em;
    line-height: 1.05;
    color: var(--ink);
    margin: 0;
    max-width: 920px;
  }
  .section-title em {
    font-family: var(--serif); font-style: italic; font-weight: 300;
    color: var(--signal);
  }
  .section-sub {
    color: var(--ink-2); margin-top: 12px; max-width: 760px; font-size: 16px;
  }

  /* command bar (top) */
  .cmd-bar {
    position: sticky; top: 0; z-index: 50;
    background: rgba(12,13,15,0.86);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--line);
    height: 48px;
    display: flex; align-items: stretch;
  }
  .cmd-bar .cell {
    border-right: 1px solid var(--line);
    padding: 0 16px;
    display: flex; align-items: center; gap: 10px;
    font-family: var(--mono); font-size: 11px;
    color: var(--ink-2); letter-spacing: 0.1em;
  }
  .cmd-bar .cell.muted { color: var(--muted); }
  .cmd-bar .cell.grow { flex: 1; }
  .cmd-bar .cell:last-child { border-right: 0; }
  .cmd-bar .nav {
    display: flex; gap: 2px; align-items: center;
  }
  .cmd-bar .nav a {
    font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase;
    padding: 8px 12px;
    color: var(--muted);
    cursor: pointer;
    border: 1px solid transparent;
  }
  .cmd-bar .nav a:hover { color: var(--ink); }
  .cmd-bar .nav a.active { color: var(--signal); }

  /* footer */
  footer {
    border-top: 1px solid var(--line);
    padding: 56px 0 32px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.05em;
  }

  /* inputs */
  input[type="text"], textarea {
    background: var(--bg-1);
    border: 1px solid var(--line);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 14px;
    padding: 10px 12px;
    width: 100%;
    outline: none;
    border-radius: 0;
  }
  input[type="text"]:focus, textarea:focus { border-color: var(--signal); }

  /* range slider */
  input[type=range] {
    -webkit-appearance: none; appearance: none;
    width: 100%; height: 28px; background: transparent;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-runnable-track {
    height: 2px; background: var(--line-2);
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--signal); margin-top: -5px;
    border: 2px solid var(--bg);
  }
  input[type=range]::-moz-range-track { height: 2px; background: var(--line-2); }
  input[type=range]::-moz-range-thumb { width: 12px; height: 12px; border-radius: 50%; background: var(--signal); border: 2px solid var(--bg); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
// ─── SHARED PRIMITIVES ────────────────────────────────────────────────────────

const { useEffect, useRef, useState, useMemo, useCallback } = React;

function SectionHead({ id, kind, title, sub, status = "OPERATIONAL" }) {
  return (
    <div className="section-head">
      <div className="section-eyebrow">
        <div className="id">{id}</div>
        <div className="kind">{kind}</div>
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 4 }}>
          <span className="pulse-dot green" />
          <span className="mono" style={{ fontSize: 10.5, color: "var(--green)", letterSpacing: "0.16em" }}>{status}</span>
        </div>
      </div>
      <div>
        <h2 className="section-title" dangerouslySetInnerHTML={{ __html: title }} />
        {sub && <p className="section-sub">{sub}</p>}
      </div>
    </div>
  );
}

function CornerPanel({ children, style, className = "", padded = true }) {
  return (
    <div
      className={`panel-bare corner-marks ${className}`}
      style={{
        position: "relative",
        background: "var(--surface)",
        padding: padded ? 24 : 0,
        ...style,
      }}
    >
      <span className="cm1" />
      <span className="cm2" />
      {children}
    </div>
  );
}

function MetaRow({ k, v, mono = true }) {
  return (
    <div style={{
      display: "grid",
      gridTemplateColumns: "120px 1fr",
      gap: 16,
      padding: "8px 0",
      borderBottom: "1px solid var(--line)",
      fontSize: 12,
    }}>
      <div className="label" style={{ fontSize: 10.5 }}>{k}</div>
      <div className={mono ? "mono" : ""} style={{ color: "var(--ink-2)", fontSize: mono ? 12 : 14 }}>{v}</div>
    </div>
  );
}

function Sparkline({ values, width = 120, height = 28, color = "var(--signal)" }) {
  const max = Math.max(...values), min = Math.min(...values);
  const span = max - min || 1;
  const pts = values.map((v, i) => {
    const x = (i / (values.length - 1)) * width;
    const y = height - ((v - min) / span) * height;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(" ");
  return (
    <svg width={width} height={height} style={{ display: "block" }}>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="1.2" />
      <circle
        cx={width}
        cy={height - ((values[values.length-1]-min)/span)*height}
        r="2"
        fill={color}
      />
    </svg>
  );
}

function Meter({ value, max = 100, color = "var(--signal)", height = 4 }) {
  return (
    <div style={{ width: "100%", height, background: "var(--line)", position: "relative" }}>
      <div style={{
        position: "absolute", inset: 0, right: "auto",
        width: `${(value/max)*100}%`,
        background: color,
      }} />
    </div>
  );
}

function useInView(opts = {}) {
  const ref = useRef(null);
  const [inView, setInView] = useState(false);
  useEffect(() => {
    if (!ref.current) return;
    const io = new IntersectionObserver(([e]) => setInView(e.isIntersecting), {
      threshold: 0.15,
      ...opts,
    });
    io.observe(ref.current);
    return () => io.disconnect();
  }, []);
  return [ref, inView];
}

function Count({ to, suffix = "", duration = 1200 }) {
  const [ref, inView] = useInView();
  const [n, setN] = useState(0);
  useEffect(() => {
    if (!inView) return;
    const start = performance.now();
    let raf;
    const step = (t) => {
      const k = Math.min(1, (t - start) / duration);
      const eased = 1 - Math.pow(1 - k, 3);
      setN(Math.round(to * eased));
      if (k < 1) raf = requestAnimationFrame(step);
    };
    raf = requestAnimationFrame(step);
    return () => cancelAnimationFrame(raf);
  }, [inView, to]);
  return <span ref={ref}>{n.toLocaleString()}{suffix}</span>;
}

// ─── HERO ─────────────────────────────────────────────────────────────────────

const TelemetryStrip = () => {
  const [t, setT] = useState(Date.now());
  useEffect(() => {
    const i = setInterval(() => setT(Date.now()), 1000);
    return () => clearInterval(i);
  }, []);
  const time = new Date(t).toUTCString().split(" ").slice(4,5)[0] + " UTC";
  const cells = [
    { k: "OPERATOR",  v: "N. WEISS" },
    { k: "ROLE",      v: "PLATFORM STAFF PM · RISE8" },
    { k: "STATUS",    v: "AVAILABLE", signal: true },
    { k: "DOMAIN",    v: "ENTERPRISE · PLATFORM · AI" },
    { k: "CLEARANCE", v: "TS ELIGIBLE · IL5 → IL6" },
    { k: "UTC",       v: time },
  ];
  return (
    <div style={{
      borderTop: "1px solid var(--line)",
      borderBottom: "1px solid var(--line)",
      display: "grid",
      gridTemplateColumns: "repeat(6, 1fr)",
    }}>
      {cells.map((c, i) => (
        <div key={i} style={{
          padding: "12px 16px",
          borderRight: i < cells.length - 1 ? "1px solid var(--line)" : 0,
          display: "flex", flexDirection: "column", gap: 4,
        }}>
          <div className="label" style={{ fontSize: 9.5 }}>{c.k}</div>
          <div className="mono" style={{
            fontSize: 12,
            color: c.signal ? "var(--green)" : "var(--ink)",
            letterSpacing: "0.06em",
            display: "flex", alignItems: "center", gap: 8,
          }}>
            {c.signal && <span className="pulse-dot green" />}
            {c.v}
          </div>
        </div>
      ))}
    </div>
  );
};

const Hero = () => {
  return (
    <section data-section="hero" data-screen-label="01 Hero" id="hero" style={{ paddingTop: 0 }}>
      <TelemetryStrip />

      <div className="container" style={{ paddingTop: 56, paddingBottom: 48 }}>
        <div style={{ display: "grid", gridTemplateColumns: "minmax(0,1fr) minmax(0,1.1fr)", gap: 48, alignItems: "start" }}>

          {/* LEFT: Headline */}
          <div>
            <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 28 }}>
              <span className="pulse-dot" />
              <span className="label label-signal">MISSION BRIEF · 26.05.08</span>
            </div>

            <h1 style={{
              fontFamily: "var(--sans)",
              fontWeight: 300,
              fontSize: "clamp(44px, 5.6vw, 84px)",
              lineHeight: 0.98,
              letterSpacing: "-0.03em",
              margin: 0,
              color: "var(--ink)",
            }}>
              Building <em style={{ fontFamily: "var(--serif)", fontStyle: "italic", fontWeight: 300, color: "var(--signal)" }}>product&nbsp;systems</em><br/>
              for the AI era.
            </h1>

            <p style={{
              marginTop: 28,
              fontSize: 17,
              lineHeight: 1.55,
              color: "var(--ink-2)",
              maxWidth: 540,
            }}>
              Product leader spanning <span style={{ color: "var(--ink)" }}>enterprise, portfolio, and
              platform PM</span>&mdash;and the practice leadership that ties them together.
              Actively integrating <span style={{ color: "var(--signal)" }}>AI workflows and agentic
              tooling</span> into how product teams operate, from production deployments to
              after-hours experiments.
            </p>

            <div style={{ display: "flex", gap: 12, marginTop: 36, flexWrap: "wrap" }}>
              <button className="btn btn-primary" onClick={() => document.getElementById("timeline")?.scrollIntoView({behavior:"smooth"})}>
                Engagement timeline ↘
              </button>
              <button className="btn" onClick={() => document.getElementById("contact")?.scrollIntoView({behavior:"smooth"})}>
                Open a channel
              </button>
            </div>

            <div style={{ marginTop: 48, display: "grid", gridTemplateColumns: "repeat(2,1fr)", gap: 24, maxWidth: 460 }}>
              <div>
                <div className="label">PMs ENABLED</div>
                <div className="mono" style={{ fontSize: 32, fontWeight: 300, letterSpacing: "-0.02em", color: "var(--ink)", marginTop: 6 }}>
                  ~<Count to={100} />
                </div>
                <div style={{ fontSize: 12, color: "var(--muted)", marginTop: 4 }}>Across portfolios &amp; coaching</div>
              </div>
              <div>
                <div className="label">CLEARANCE</div>
                <div className="mono" style={{ fontSize: 32, fontWeight: 300, letterSpacing: "-0.02em", color: "var(--ink)", marginTop: 6 }}>
                  TS<span style={{ color: "var(--muted)" }}>·</span>IL5
                </div>
                <div style={{ fontSize: 12, color: "var(--muted)", marginTop: 4 }}>Top Secret eligible · IL5 (→ IL6)</div>
              </div>
            </div>
          </div>

          {/* RIGHT: Portrait */}
          <div style={{ position: "relative" }}>
            <CornerPanel padded={false} style={{ height: 520, position: "relative", overflow: "hidden" }}>
              {/* portrait image */}
              <img
                src="assets/nick.jpg"
                alt="Nicholas Weiss"
                style={{
                  position: "absolute", inset: 0, width: "100%", height: "100%",
                  objectFit: "cover", objectPosition: "center 22%",

                }}
              />
              {/* tonal gradient to integrate with dark UI */}
              <div style={{
                position: "absolute", inset: 0, zIndex: 2, pointerEvents: "none",
                background: "linear-gradient(180deg, rgba(12,13,15,0.35) 0%, rgba(12,13,15,0) 28%, rgba(12,13,15,0) 62%, rgba(12,13,15,0.78) 100%)",
              }} />
              {/* faint grid overlay */}
              <div style={{
                position: "absolute", inset: 0, zIndex: 2, pointerEvents: "none",
                backgroundImage: "linear-gradient(to right, rgba(230,178,105,0.05) 1px, transparent 1px), linear-gradient(to bottom, rgba(230,178,105,0.05) 1px, transparent 1px)",
                backgroundSize: "56px 56px",
                mixBlendMode: "screen",
              }} />
              {/* signal tint */}
              <div style={{
                position: "absolute", inset: 0, zIndex: 2, pointerEvents: "none",
                background: "radial-gradient(ellipse at 70% 30%, rgba(230,178,105,0.10), transparent 55%)",
              }} />

              {/* top chrome */}
              <div style={{
                position: "absolute", top: 12, left: 16, right: 16, zIndex: 3,
                display: "flex", justifyContent: "space-between", fontSize: 10.5,
                fontFamily: "var(--mono)", color: "var(--muted)", letterSpacing: "0.16em",
              }}>
                <span style={{ display: "inline-flex", alignItems: "center", gap: 8 }}>
                  <span className="pulse-dot green" />
                  <span style={{ color: "var(--green)" }}>OPERATOR ID · NW-001</span>
                </span>
                <span style={{ color: "var(--signal)" }}>VISUAL · LIVE</span>
              </div>

              {/* corner crosshairs */}
              {[[16,16,1,1],[16,16,-1,1],[16,16,1,-1],[16,16,-1,-1]].map((c,i)=>(
                <div key={i} style={{
                  position:"absolute", zIndex:3,
                  [c[2]<0?"right":"left"]: c[0],
                  [c[3]<0?"bottom":"top"]: c[1],
                  width: 14, height: 14,
                  borderColor: "var(--signal)",
                  borderStyle: "solid",
                  borderWidth: `${c[3]<0?0:1}px ${c[2]<0?1:0}px ${c[3]<0?1:0}px ${c[2]<0?0:1}px`,
                  opacity: 0.85,
                }} />
              ))}

              {/* bottom plate */}
              <div style={{
                position: "absolute", bottom: 0, left: 0, right: 0, zIndex: 3,
                padding: "14px 18px 14px",
                display: "grid",
                gridTemplateColumns: "1fr auto",
                alignItems: "end",
                gap: 16,
                borderTop: "1px solid rgba(230,178,105,0.18)",
                background: "linear-gradient(180deg, rgba(12,13,15,0) 0%, rgba(12,13,15,0.55) 60%)",
              }}>
                <div>
                  <div className="mono" style={{ fontSize: 10, color: "var(--muted)", letterSpacing: "0.22em" }}>SUBJECT</div>
                  <div style={{
                    fontFamily: "var(--sans)", fontWeight: 400,
                    fontSize: 22, letterSpacing: "-0.01em", color: "var(--ink)",
                    marginTop: 2,
                  }}>
                    Nicholas Weiss

const COMMITS = (() => {

  const rand = () => { seed = (seed * 9301 + 49297) % 233280; return seed / 233280; };
  for (let w = 0; w < 52; w++) {
    const col = [];
    for (let d = 0; d < 7; d++) {
      const r = rand();
      let lvl = 0;
      if (r > 0.92) lvl = 4;
      else if (r > 0.78) lvl = 3;
      else if (r > 0.55) lvl = 2;
      else if (r > 0.30) lvl = 1;
      if (d === 0 || d === 6) lvl = Math.max(0, lvl - 1);
      col.push(lvl);
    }
    arr.push(col);
  }
  return arr;
})();

// ─── APP ──────────────────────────────────────────────────────────────────────

const NAV = [
  { id: "hero",       label: "BRIEF" },
  { id: "timeline",   label: "TIMELINE" },
  { id: "projects",   label: "SYSTEMS" },
  { id: "philosophy", label: "DOCTRINE" },
  { id: "thought",    label: "ESSAYS" },
  { id: "contact",    label: "CHANNEL" },
];

function App() {
  const [active, setActive] = useState("hero");
  const [scrollPct, setScrollPct] = useState(0);

  useEffect(() => {
    const onScroll = () => {
      const h = document.documentElement;
      const pct = h.scrollTop / Math.max(1, (h.scrollHeight - h.clientHeight));
      setScrollPct(Math.min(1, Math.max(0, pct)));

      let cur = "hero";
      for (const n of NAV) {
        const el = document.getElementById(n.id);
        if (!el) continue;
        const r = el.getBoundingClientRect();
        if (r.top < 200) cur = n.id;
      }
      setActive(cur);
    };
    onScroll();
    window.addEventListener("scroll", onScroll, { passive: true });
    return () => window.removeEventListener("scroll", onScroll);
  }, []);

  const scrollTo = (id) => document.getElementById(id)?.scrollIntoView({ behavior: "smooth", block: "start" });

  return (
    <>
      <CmdBar active={active} onJump={scrollTo} pct={scrollPct} />
      <Hero />
      <Timeline />
      <Projects />
      <Philosophy />
      <Thought />
      <Contact />
      <Footer />
    </>
  );
}

function CmdBar({ active, onJump, pct }) {
  return (
    <div className="cmd-bar">
      <div className="cell" style={{ borderRight: "1px solid var(--line)" }}>
        <span className="pulse-dot green" />
        <span style={{ color: "var(--green)", letterSpacing: "0.2em", fontWeight: 500 }}>NW · OPS</span>
      </div>
      <div className="cell muted" style={{ minWidth: 220 }}>
        <span>NICHOLAS WEISS</span>
        <span style={{ color: "var(--muted-2)" }}>—</span>
        <span>PRODUCT &amp; PLATFORM</span>
      </div>
      <div className="cell grow" style={{ padding: 0, justifyContent: "center" }}>
        <div className="nav">
          {NAV.map(n => (
            <a
              key={n.id}
              className={active === n.id ? "active" : ""}
              onClick={() => onJump(n.id)}
            >
              {n.label}
            </a>
          ))}
        </div>
      </div>
      <div className="cell muted" style={{ width: 140, justifyContent: "flex-end", gap: 12 }}>
        <span style={{ letterSpacing: "0.14em" }}>SCROLL</span>
        <span className="mono" style={{ color: "var(--signal)", letterSpacing: "0.1em" }}>
          {Math.round(pct*100).toString().padStart(3,"0")}%
        </span>
      </div>
      <div className="cell" style={{ width: 6, padding: 0, position: "relative", overflow: "hidden" }}>
        <div style={{
          position: "absolute", left: 0, top: 0, bottom: 0,
          width: `${pct*100}%`, background: "var(--signal)",
        }} />
      </div>
    </div>
  );
}

  return (
    <footer>

}
